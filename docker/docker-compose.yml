services:

  # ── API REST Flask ────────────────────────────────────────
  api-rest:
    build:
      context: ../exercice1_rest   # dossier contenant le Dockerfile et app.py
      dockerfile: Dockerfile
    container_name: eche834-api-rest
    ports:
      - "5000:5000"                # hôte:conteneur
    environment:
      - API_TOKEN=${API_TOKEN:-mon_token_secret_123}
      - FLASK_ENV=development
    volumes:
      - ../exercice1_rest:/app     # hot reload : les modifications locales sont reflétées
    restart: unless-stopped

  # ── API GraphQL FastAPI ──────────────────────────────────
  api-graphql:
    build:
      context: ../exercice2_graphql
      dockerfile: Dockerfile
    container_name: eche834-api-graphql
    ports:
      - "8000:8000"
    environment:
      - API_TOKEN=${API_TOKEN:-mon_token_secret_123}
    volumes:
      - ../exercice2_graphql:/app
    restart: unless-stopped
    depends_on:
      - api-rest               # démarre uniquement après l'API REST

#   http://api-rest:5000      (depuis api-graphql)
#   http://api-graphql:8000   (depuis api-rest)
